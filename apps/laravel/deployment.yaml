apiVersion: apps/v1
kind: Deployment
metadata:
  name: laravel
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: laravel
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: laravel
    spec:
      initContainers:
        - name: init-copy-app
          image: ghcr.io/iamsreepathi/laravel:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              echo "Copying app code into shared volume..."
              cp -a /var/www/html/. /shared/
              echo "Done."
          volumeMounts:
            - name: app-code
              mountPath: /shared
      containers:
        - name: nginx
          image: nginx:stable-alpine
          ports:
            - containerPort: 80
              name: nginx
          imagePullPolicy: IfNotPresent
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          volumeMounts:
            - mountPath: /var/www/html
              name: app-code
            - mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              name: nginx-config
        - name: laravel
          image: ghcr.io/iamsreepathi/laravel:latest
          ports:
            - containerPort: 9000
              name: php-fpm
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: laravel-configmap
            - secretRef:
                name: laravel-secret
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - mountPath: /var/www/html
              name: app-code
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
        - name: app-code
          emptyDir: {}
