apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/iamsreepathi/gitops
    targetRevision: HEAD
    path: argo/applications/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
