apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: laravel
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  source:
    repoURL: https://github.com/iamsreepathi/gitops
    path: apps/cve-tracker
    targetRevision: HEAD
  syncPolicy:
    automated:
      enabled: true
      selfHeal: true
